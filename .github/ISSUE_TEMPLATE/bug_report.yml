name: Bug Report
description: 报告一个 Bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间反馈问题！请尽量详细填写以下信息。

  - type: input
    id: version
    attributes:
      label: 版本
      description: "@zhiaiwan/event-bus 版本号"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简明地描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 列出最小化的复现步骤
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生的行为

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的行为

  - type: textarea
    id: context
    attributes:
      label: 环境信息
      description: "Node 版本、浏览器、OS 等"
      render: text
