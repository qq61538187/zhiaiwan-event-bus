name: Feature Request
description: 提出新功能建议
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简明地描述你希望增加的功能
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 为什么需要这个功能？解决了什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 如果你有实现思路，请描述

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
