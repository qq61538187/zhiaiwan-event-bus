<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><title>policies</title><link rel="stylesheet" href="../shared.css" /></head>
  <body>
    <div class="page"><div class="page-header"><h1>Policies</h1></div><div class="card"><button id="run" class="btn">运行</button><pre id="out" class="output"></pre></div></div>
    <script type="importmap">{ "imports": { "@zhiaiwan/event-bus": "../../dist/index.js" } }</script>
    <script type="module">
      import { createEventBus } from '@zhiaiwan/event-bus'
      const out = document.getElementById('out')
      const bus = createEventBus()
      let n = 0
      bus.on('job.run', async () => {
        n += 1
        if (n === 1) throw new Error('first fail')
        return 'ok'
      }, { retry: { times: 1 }, timeoutMs: 100 })
      document.getElementById('run').onclick = async () => {
        const result = await bus.emitCollect('job.run', [])
        out.textContent = JSON.stringify({ result, attemptCount: n }, null, 2)
      }
    </script>
  </body>
</html>
