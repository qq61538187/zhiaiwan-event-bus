<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>policies</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <h1>Policies</h1>
        <p>覆盖 <code>retry</code> / <code>timeout</code> / <code>cancel</code> / <code>concurrency</code> / <code>shouldRetry</code> / <code>profile</code>。</p>
      </div>
      <div class="card">
        <div class="btn-group">
          <button data-action="retry-timeout" class="btn">retry + timeout</button>
          <button data-action="should-retry" class="btn">shouldRetry</button>
          <button data-action="retry-profile" class="btn">retry profile</button>
          <button data-action="abort" class="btn">AbortSignal cancel</button>
          <button data-action="concurrency" class="btn btn-success">concurrency</button>
          <button data-action="clear" class="btn">清空</button>
        </div>
        <pre id="out" class="output"></pre>
      </div>
    </div>
    <script type="importmap">
      { "imports": { "@zhiaiwan/event-bus": "../../dist/index.js" } }
    </script>
    <script type="module">
      import { createEventBus, isRetriableNetworkError } from '@zhiaiwan/event-bus'

      const out = document.getElementById('out')
      const log = (line) => {
        out.textContent += `${line}\n`
      }

      const actions = {
        async retryTimeout() {
          const bus = createEventBus()
          let n = 0
          bus.on(
            'job.retry',
            async () => {
              n += 1
              if (n === 1) throw new Error('first fail')
              return 'ok'
            },
            { retry: { times: 1 }, timeoutMs: 100 },
          )
          const result = await bus.emitCollect('job.retry', [])
          log(JSON.stringify({ case: 'retry-timeout', result, attemptCount: n }, null, 2))
          await bus.destroy()
        },
        async shouldRetry() {
          const bus = createEventBus()
          let attempt = 0
          bus.on(
            'job.retry-check',
            async () => {
              attempt += 1
              throw new Error('fatal')
            },
            {
              retry: {
                times: 3,
                jitterMs: 20,
                shouldRetry: (error) => isRetriableNetworkError(error),
              },
            },
          )
          try {
            await bus.emitCollect('job.retry-check', [])
          } catch (error) {
            log(
              JSON.stringify(
                {
                  case: 'should-retry',
                  attempt,
                  message: error instanceof Error ? error.message : String(error),
                },
                null,
                2,
              ),
            )
          }
          await bus.destroy()
        },
        async retryProfile() {
          const bus = createEventBus()
          let attempt = 0
          bus.on(
            'job.retry-profile',
            async () => {
              attempt += 1
              if (attempt < 3) throw new Error('temporary network timeout')
              return 'ok'
            },
            {
              retry: {
                profile: 'balanced',
                shouldRetry: (error) => isRetriableNetworkError(error),
              },
            },
          )
          const result = await bus.emitCollect('job.retry-profile', [])
          log(JSON.stringify({ case: 'retry-profile', result, attempt }, null, 2))
          await bus.destroy()
        },
        async abort() {
          const bus = createEventBus()
          bus.on('job.abort', async () => {
            await new Promise((resolve) => setTimeout(resolve, 20))
            return 'done'
          })
          const controller = new AbortController()
          controller.abort()
          try {
            await bus.emitCollect('job.abort', [], { signal: controller.signal })
          } catch (error) {
            log(
              JSON.stringify(
                { case: 'abort', message: error instanceof Error ? error.message : String(error) },
                null,
                2,
              ),
            )
          }
          await bus.destroy()
        },
        async concurrency() {
          const bus = createEventBus()
          let active = 0
          let peak = 0
          bus.on(
            'job.concurrent',
            async () => {
              active += 1
              peak = Math.max(peak, active)
              await new Promise((resolve) => setTimeout(resolve, 10))
              active -= 1
            },
            { concurrency: 1 },
          )
          await Promise.all([
            bus.emit('job.concurrent', []),
            bus.emit('job.concurrent', []),
            bus.emit('job.concurrent', []),
          ])
          log(JSON.stringify({ case: 'concurrency', peak }, null, 2))
          await bus.destroy()
        },
        clear() {
          out.textContent = ''
        },
      }

      document.addEventListener('click', (event) => {
        const target = event.target
        if (!(target instanceof HTMLElement)) return
        const action = target.dataset.action
        if (!action) return
        const key = action.replace(/-([a-z])/g, (_, c) => c.toUpperCase())
        if (key in actions) {
          void actions[key]()
        }
      })
    </script>
  </body>
</html>
