<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@zhiaiwan/event-bus - priority-context</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <h1>优先级与上下文示例</h1>
        <p>演示 <code>priority</code> 执行顺序与监听器 <code>ctx</code>（attempt/meta）信息。</p>
      </div>

      <div class="card">
        <h3>交互区</h3>
        <div class="btn-group">
          <button data-action="bind" class="btn">绑定监听器</button>
          <button data-action="emit" class="btn btn-success">触发 calc</button>
          <button data-action="clear" class="btn">清空日志</button>
        </div>
        <div id="output" class="output mono"></div>
      </div>
    </div>

    <script type="importmap">
      { "imports": { "@zhiaiwan/event-bus": "../../dist/index.js" } }
    </script>
    <script type="module">
      import { createEventBus } from '@zhiaiwan/event-bus'

      const output = document.getElementById('output')
      const log = (line) => {
        output.textContent += `${line}\n`
      }

      const bus = createEventBus()
      let bound = false
      const makeHandler = (label) => ([value], ctx) => {
        log(`[${label}] value=${value}, attempt=${ctx.attempt}, source=${ctx.meta.source ?? '-'}`)
      }

      const actions = {
        bind() {
          if (bound) {
            log('already bound')
            return
          }
          bound = true
          bus.on('calc', makeHandler('priority-1'), { priority: 1 })
          bus.on('calc', makeHandler('priority-10'), { priority: 10 })
          bus.on('calc', makeHandler('priority-5'), { priority: 5 })
          log('bound listeners with priority: 10 > 5 > 1')
        },
        async emit() {
          const value = Math.floor(Math.random() * 100)
          await bus.emit('calc', [value], { meta: { source: 'priority-demo' } })
          log('emit finished')
        },
        clear() {
          output.textContent = ''
        },
      }

      document.addEventListener('click', (e) => {
        const action = e.target?.dataset?.action
        if (action && actions[action]) void actions[action]()
      })
    </script>
  </body>
</html>
